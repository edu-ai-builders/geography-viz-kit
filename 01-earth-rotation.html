<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>地球自转 · 地方时与时区 · 3D 交互演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #070a13;
    --bg-panel: rgba(12, 17, 28, 0.82);
    --bg-panel-solid: #0c111c;
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.18);
    --text-primary: #e8ecf3;
    --text-secondary: #8a95a8;
    --text-dim: #5a6577;
    --accent-warm: #f4a853;
    --accent-hot: #e85d4a;
    --accent-cool: #6db3d9;
    --accent-green: #7dc48a;
    --font-display: 'Fraunces', 'Noto Serif SC', serif;
    --font-sans: 'Noto Sans SC', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-sans);
    overflow: hidden;
    font-weight: 300;
    letter-spacing: 0.01em;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(109, 179, 217, 0.06), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(244, 168, 83, 0.04), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  #app { display: grid; grid-template-columns: 340px 1fr 280px; height: 100vh; position: relative; z-index: 1; }

  /* ============ LEFT CONTROL PANEL ============ */
  .panel-left {
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 28px 24px;
  }
  .panel-left::-webkit-scrollbar { width: 4px; }
  .panel-left::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }

  .brand-block { margin-bottom: 32px; }
  .brand-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .brand-title em {
    font-style: italic;
    color: var(--accent-warm);
    font-weight: 400;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-family: var(--font-mono);
  }

  .section { margin-bottom: 28px; }
  .section-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-family: var(--font-mono);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '';
    width: 6px; height: 1px;
    background: var(--accent-warm);
  }

  /* Knowledge point selector */
  .kp-select {
    width: 100%;
    padding: 11px 14px;
    background: transparent;
    border: 1px solid var(--line-strong);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 13px;
    border-radius: 2px;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'%3e%3cpath fill='none' stroke='%238a95a8' d='M1 1l4 4 4-4'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 10px;
  }
  .kp-select:hover { border-color: var(--accent-warm); }
  .kp-select option { background: var(--bg-panel-solid); }

  /* Sliders */
  .slider-row { margin-bottom: 14px; }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .slider-label { font-size: 12px; color: var(--text-secondary); }
  .slider-value {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent-warm);
    font-weight: 500;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line-strong);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent-warm);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--bg-deep);
    box-shadow: 0 0 0 1px var(--accent-warm);
  }
  input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px;
    background: var(--accent-warm);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--bg-deep);
  }

  /* Buttons */
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .btn-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .btn {
    padding: 9px 10px;
    background: transparent;
    border: 1px solid var(--line-strong);
    color: var(--text-secondary);
    font-family: var(--font-sans);
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s ease;
    letter-spacing: 0.02em;
  }
  .btn:hover { border-color: var(--accent-warm); color: var(--text-primary); }
  .btn.primary { background: var(--accent-warm); color: #1a1208; border-color: var(--accent-warm); font-weight: 500; }
  .btn.primary:hover { background: #f7b868; }

  /* Checkboxes */
  .check-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px 14px;
  }
  .check {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }
  .check input {
    appearance: none;
    width: 14px; height: 14px;
    border: 1px solid var(--line-strong);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  .check input:checked {
    background: var(--accent-warm);
    border-color: var(--accent-warm);
  }
  .check input:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 0px;
    width: 4px; height: 8px;
    border: solid var(--bg-deep);
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
  }
  .check:hover { color: var(--text-primary); }

  /* ============ MAIN CANVAS ============ */
  .canvas-wrap {
    position: relative;
    background: radial-gradient(ellipse at center, #0a1220 0%, #050811 100%);
  }
  #three-canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  #three-canvas:active { cursor: grabbing; }

  /* Knowledge explanation overlay */
  .kp-overlay {
    position: absolute;
    top: 24px;
    left: 24px;
    right: 24px;
    max-width: 720px;
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    border: 1px solid var(--line);
    border-left: 2px solid var(--accent-warm);
    padding: 16px 20px;
    border-radius: 2px;
    z-index: 10;
  }
  .kp-overlay-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .kp-overlay-title {
    font-size: 10px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--accent-warm);
  }
  .kp-overlay-close {
    cursor: pointer;
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1;
    background: none;
    border: none;
  }
  .kp-overlay-body {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-secondary);
  }
  .kp-overlay-body strong { color: var(--text-primary); font-weight: 500; }

  /* Legend / indicator */
  .scene-legend {
    position: absolute;
    bottom: 20px;
    left: 24px;
    display: flex;
    gap: 18px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
  }
  .scene-legend .lg-item { display: flex; align-items: center; gap: 6px; }
  .scene-legend .lg-swatch { width: 14px; height: 2px; }

  /* ============ RIGHT DATA PANEL ============ */
  .panel-right {
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    padding: 28px 22px;
  }
  .panel-right::-webkit-scrollbar { width: 4px; }
  .panel-right::-webkit-scrollbar-thumb { background: var(--line-strong); }

  .data-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }
  .data-block {
    padding: 14px 0;
    border-top: 1px solid var(--line);
  }
  .data-block:first-of-type { border-top: none; padding-top: 0; }
  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    font-size: 12px;
  }
  .data-label { color: var(--text-dim); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .data-value { color: var(--text-primary); font-family: var(--font-mono); font-weight: 500; font-size: 13px; }
  .data-value.accent { color: var(--accent-warm); }
  .data-value.hot { color: var(--accent-hot); }
  .data-value.cool { color: var(--accent-cool); }

  .city-block {
    margin-top: 14px;
    padding: 12px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .city-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .city-name .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }
  .city-coord {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
  }
  .city-time {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 400;
    color: var(--accent-warm);
    letter-spacing: 0.02em;
    margin: 6px 0 4px;
  }
  .city-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 12px; }

  /* Top fixed badge */
  .top-badge {
    position: absolute;
    top: 24px;
    right: 24px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    z-index: 5;
  }

  /* Instruction */
  .instruction {
    position: absolute;
    bottom: 20px;
    right: 24px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    letter-spacing: 0.12em;
  }

  /* Hide scrollbar style fallback */
  @media (max-width: 1200px) {
    #app { grid-template-columns: 300px 1fr 240px; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- ============ LEFT PANEL ============ -->
  <aside class="panel-left">
    <div class="brand-block">
      <div class="brand-sub">Geographic Time · Module 01</div>
      <h1 class="brand-title">Earth <em>Rotation</em></h1>
      <div style="font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.6;">地方时 · 时区 · 晨昏圈 · 自转方向</div>
    </div>

    <div class="section">
      <div class="section-label">知识点</div>
      <select class="kp-select" id="kp-select">
        <option value="local-time">地方时与时区</option>
        <option value="terminator">晨昏圈与昼夜</option>
        <option value="rotation-direction">自转方向与偏向力</option>
        <option value="tropics">回归线与极圈</option>
      </select>
    </div>

    <div class="section">
      <div class="section-label">自转速率</div>
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-label">演示倍率</span>
          <span class="slider-value" id="speed-value">30×</span>
        </div>
        <input type="range" id="speed" min="0" max="500" value="30" />
      </div>
      <div class="btn-row">
        <button class="btn primary" id="btn-pause">暂停</button>
        <button class="btn" id="btn-reset-view">重置视角</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">视角</div>
      <div class="btn-row-3">
        <button class="btn" data-view="north">北极俯视</button>
        <button class="btn" data-view="side">侧视</button>
        <button class="btn" data-view="south">南极俯视</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">可视化图层</div>
      <div class="check-grid">
        <label class="check"><input type="checkbox" id="layer-sun" checked>太阳光线</label>
        <label class="check"><input type="checkbox" id="layer-terminator" checked>晨昏圈</label>
        <label class="check"><input type="checkbox" id="layer-graticule" checked>经纬网</label>
        <label class="check"><input type="checkbox" id="layer-timezones">时区分界</label>
        <label class="check"><input type="checkbox" id="layer-hourlabels" checked>地方时标签</label>
        <label class="check"><input type="checkbox" id="layer-arrows" checked>自转方向</label>
        <label class="check"><input type="checkbox" id="layer-tropics" checked>回归线</label>
        <label class="check"><input type="checkbox" id="layer-poles" checked>南北极点</label>
        <label class="check"><input type="checkbox" id="layer-clouds" checked>云层</label>
        <label class="check"><input type="checkbox" id="layer-bloom" checked>辉光</label>
      </div>
    </div>

    <div class="section">
      <div class="section-label">参照城市</div>
      <div class="check-grid" id="city-toggles">
        <!-- filled by JS -->
      </div>
    </div>

    <div class="section">
      <div class="section-label">日期（直射纬度）</div>
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-label" id="date-label">春分 3/21</span>
          <span class="slider-value" id="decl-value">+0.0°</span>
        </div>
        <input type="range" id="doy" min="0" max="365" value="80" />
      </div>
    </div>
  </aside>

  <!-- ============ CENTER CANVAS ============ -->
  <main class="canvas-wrap">
    <canvas id="three-canvas"></canvas>

    <div class="kp-overlay" id="kp-overlay">
      <div class="kp-overlay-header">
        <div class="kp-overlay-title">知识点解读</div>
        <button class="kp-overlay-close" id="kp-close">—</button>
      </div>
      <div class="kp-overlay-body" id="kp-body"></div>
    </div>

    <div class="top-badge">geo · time · spatial</div>

    <div class="scene-legend">
      <div class="lg-item"><span class="lg-swatch" style="background:#f4a853"></span>太阳光线</div>
      <div class="lg-item"><span class="lg-swatch" style="background:#e85d4a"></span>赤道</div>
      <div class="lg-item"><span class="lg-swatch" style="background:#6db3d9"></span>晨昏圈</div>
      <div class="lg-item"><span class="lg-swatch" style="background:rgba(255,255,255,0.4)"></span>经纬网</div>
    </div>

    <div class="instruction">左键拖拽 · 滚轮缩放 · 右键平移</div>
  </main>

  <!-- ============ RIGHT PANEL ============ -->
  <aside class="panel-right">
    <h2 class="data-title">实时数据</h2>

    <div class="data-block">
      <div class="data-row"><span class="data-label">UTC 时间</span><span class="data-value" id="utc-time">00:00:00</span></div>
      <div class="data-row"><span class="data-label">太阳直射经度</span><span class="data-value accent" id="sun-lon">0.0°</span></div>
      <div class="data-row"><span class="data-label">太阳直射纬度</span><span class="data-value hot" id="sun-lat">+0.0°</span></div>
      <div class="data-row"><span class="data-label">自转方向</span><span class="data-value cool">自西向东</span></div>
      <div class="data-row"><span class="data-label">偏向力（北半球）</span><span class="data-value">向右偏</span></div>
    </div>

    <div class="data-block">
      <div class="data-label" style="margin-bottom: 8px;">参照城市</div>
      <div id="city-cards"></div>
    </div>
  </aside>
</div>

<!-- ============ THREE.JS ============ -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ====================== CONSTANTS ======================
const EARTH_RADIUS = 1.0;
const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;

// World cities: name, lat, lon, color
const CITIES = [
  { id:'shanghai', name:'上海', lat:31.2,  lon:121.5, color:'#7dc48a', on:true },
  { id:'paris',    name:'巴黎', lat:48.9,  lon:2.4,   color:'#6db3d9', on:true },
  { id:'cairo',    name:'开罗', lat:30.0,  lon:31.2,  color:'#f4a853', on:true },
  { id:'newyork',  name:'纽约', lat:40.7,  lon:-74.0, color:'#e85d4a', on:false },
  { id:'la',       name:'洛杉矶', lat:34.0, lon:-118.2, color:'#c478d9', on:false },
  { id:'london',   name:'伦敦', lat:51.5,  lon:-0.1,  color:'#d9d478', on:false },
  { id:'moscow',   name:'莫斯科', lat:55.8, lon:37.6, color:'#8a95a8', on:false },
  { id:'sydney',   name:'悉尼', lat:-33.9, lon:151.2, color:'#d96db3', on:false },
];

const KP_DOCS = {
  'local-time': `<strong>地方时</strong>由经度决定：经度每相差 15°，地方时相差 1 小时；同一时刻东经地方时更早、西经更晚。为便于统一计时，全球划为 <strong>24 个时区</strong>，各时区采用本区中央经线的地方时作为区时（标准时）。0 时区以本初子午线附近（约 7.5°W–7.5°E）为核心，东 1 区到东 12 区，向西依次为西 1 区到西 12 区；相邻时区区时相差 1 小时。180° 附近设有国际日期变更线。`,
  'terminator': `<strong>晨昏圈</strong>是地球上昼夜两半球的分界线，一个大圆。它始终与太阳光线垂直。地球自转时，晨昏圈相对地面自东向西移动——<strong>晨线</strong>（由夜转昼）上的地点此刻正在迎来日出，<strong>昏线</strong>（由昼转夜）上正在日落。二分日时晨昏圈过两极、平分所有纬线；二至日时它偏离两极约 23.5°。`,
  'rotation-direction': `地球自转方向为<strong>自西向东</strong>。从北极上空俯视呈逆时针，从南极上空俯视呈顺时针——这就是教学中常说的"北逆南顺"。自转产生<strong>地转偏向力</strong>（科氏力）：北半球运动物体向右偏，南半球向左偏，赤道上无偏向。这一机制塑造了大气环流、洋流方向和河道冲刷不对称。`,
  'tropics': `<strong>回归线</strong>是太阳直射点南北移动的极限纬线（±23.4°），对应夏至（北回归线）和冬至（南回归线）。回归线与赤道之间的区域一年中有两次太阳直射，回归线上一次，回归线之外无直射。<strong>极圈</strong>（±66.6°）是出现极昼极夜现象的最低纬度——从极圈到极点，极昼和极夜的持续时间从 1 天扩展到 6 个月。`,
};

// ====================== THREE SETUP ======================
const canvas = document.getElementById('three-canvas');
const wrap = canvas.parentElement;
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(42, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
camera.position.set(3.2, 1.4, 3.4);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
renderer.setClearColor(0x050811, 1);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
labelRenderer.domElement.style.position = 'absolute';

// Real Earth texture from NASA Blue Marble via three.js official CDN.
// Sphere UV: three.js SphereGeometry default UV has seam at +X (longitude 180° E/W).
// Equirectangular image: u=0 maps to longitude -180°, u=1 to +180°.
// But three.js SphereGeometry starts u=0 at +Z (longitude 90° E) by default — so texture
// appears rotated. We correct by rotating the earthMesh itself, or we offset UVs in the shader.
// Simpler: we rotate earthMesh by -Math.PI/2 around Y so u=0 lines up with -180°.

const TEX_EARTH_DAY   = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_atmos_2048.jpg';
const TEX_EARTH_SPEC  = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_specular_2048.jpg';
const TEX_EARTH_NORM  = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_normal_2048.jpg';
const TEX_EARTH_NIGHT = 'https://cdn.jsdelivr.net/gh/vasturiano/three-globe@2.31.1/example/img/earth-night.jpg';

const pctx = placeholderCanvas.getContext('2d');
pctx.fillStyle = '#0e1830'; pctx.fillRect(0,0,4,2);
const placeholderTex = new THREE.CanvasTexture(placeholderCanvas);

const dayTex = texLoader.load(
  TEX_EARTH_DAY,
  t => { t.colorSpace = THREE.SRGBColorSpace; earthMat.uniforms.uDayMap.value = t; earthMat.uniforms.uHasTex.value = 1.0; earthMat.needsUpdate = true; },
  undefined,
  err => { console.warn('Earth texture failed to load, using placeholder', err); }
);
dayTex.colorSpace = THREE.SRGBColorSpace;

const specTex = texLoader.load(
  TEX_EARTH_SPEC,
  t => { earthMat.uniforms.uSpecMap.value = t; earthMat.uniforms.uHasSpec.value = 1.0; },
  undefined,
  () => {}
);

texLoader.load(
  TEX_EARTH_NORM,
  t => { earthMat.uniforms.uNormalMap.value = t; earthMat.uniforms.uHasNorm.value = 1.0; earthMat.needsUpdate = true; },
  undefined,
  () => {}
);

texLoader.load(
  TEX_EARTH_NIGHT,
  t => { t.colorSpace = THREE.SRGBColorSpace; earthMat.uniforms.uNightMap.value = t; earthMat.uniforms.uHasNight.value = 1.0; earthMat.needsUpdate = true; },
  undefined,
  () => {}
);

const earthVert = `
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec2 vUv;
  void main() {
    vNormal = normalize(mat3(modelMatrix) * normal);
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    vUv = uv;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const earthFrag = `
  precision highp float;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec2 vUv;
  uniform vec3 uSunDir;
  uniform sampler2D uDayMap;
  uniform sampler2D uSpecMap;
  uniform sampler2D uNightMap;
  uniform sampler2D uNormalMap;
  uniform float uHasTex;
  uniform float uHasSpec;
  uniform float uHasNight;
  uniform float uHasNorm;

  void main() {
    // Robust UV from surface normal — independent of SphereGeometry UV convention.
    // Longitude 0° (world +X) → u=0.5; +90°E (world +Z) → u=0.75.
    vec3 rawN = normalize(vNormal);
    float lon = atan(rawN.z, rawN.x);
    float lat = asin(clamp(rawN.y, -1.0, 1.0));
    vec2 uv = vec2(lon / (2.0 * 3.14159265) + 0.5, 0.5 - lat / 3.14159265);

    // Day texture
    vec3 dayCol = uHasTex > 0.5 ? texture2D(uDayMap, uv).rgb : vec3(0.12, 0.18, 0.28);

    // Normal map — TBN perturbation in world space
    vec3 N = rawN;
    if (uHasNorm > 0.5) {
      vec3 mapN = texture2D(uNormalMap, uv).rgb * 2.0 - 1.0;
      vec3 T = normalize(cross(vec3(0.0, 1.0, 0.0), N));
      vec3 B = normalize(cross(N, T));
      // Guard poles where T degenerates
      float poleGuard = 1.0 - smoothstep(0.97, 0.999, abs(N.y));
      N = normalize(mix(N, mat3(T, B, N) * mapN, poleGuard));
    }

    // Lighting from perturbed normal
    float lighting = dot(N, normalize(uSunDir));
    float dayF  = smoothstep(-0.12, 0.18, lighting);   // day/night blend (terminator)
    float nightF = 1.0 - smoothstep(-0.25, 0.05, lighting); // night lights blend

    // Night side: real city lights texture
    vec3 nightLights = vec3(0.0);
    if (uHasNight > 0.5) {
      vec3 nl = texture2D(uNightMap, uv).rgb;
      nightLights = nl * nl * 2.8; // gamma boost for warm glow
    }
    vec3 nightCol = dayCol * 0.04 + vec3(0.006, 0.010, 0.018) + nightLights * nightF;

    // Day side lighting
    vec3 litDay = dayCol * (0.32 + 0.78 * max(lighting, 0.0));

    // Specular sun glint on ocean
    float specMask = uHasSpec > 0.5 ? texture2D(uSpecMap, uv).r : 0.0;
    vec3 viewDir = normalize(cameraPosition - vWorldPos);
    vec3 halfDir = normalize(normalize(uSunDir) + viewDir);
    float specVal = pow(max(dot(N, halfDir), 0.0), 36.0) * specMask * dayF;
    litDay += vec3(1.0, 0.96, 0.82) * specVal * 0.85;

    vec3 col = mix(nightCol, litDay, dayF);

    // Atmospheric rim glow (blue halo, stronger on day limb)
    float rim = 1.0 - max(dot(viewDir, rawN), 0.0);
    col += vec3(0.25, 0.52, 0.88) * pow(rim, 3.2) * 0.6 * (0.3 + 0.7 * dayF);

    gl_FragColor = vec4(col, 1.0);
  }
`;
const earthMat = new THREE.ShaderMaterial({
  uniforms: {
    uSunDir:   { value: new THREE.Vector3(1, 0, 0) },
    uDayMap:   { value: placeholderTex },
    uSpecMap:  { value: placeholderTex },
    uNightMap: { value: placeholderTex },
    uNormalMap:{ value: placeholderTex },
    uHasTex:   { value: 0.0 },
    uHasSpec:  { value: 0.0 },
    uHasNight: { value: 0.0 },
    uHasNorm:  { value: 0.0 },
  },
  vertexShader: earthVert,
  fragmentShader: earthFrag,
});

// ====================== GRATICULE (LAT/LON LINES) ======================
function makeGraticule() {
  const group = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.16 });
  const matEq = new THREE.LineBasicMaterial({ color: 0xe85d4a, transparent: true, opacity: 0.55 });
  const R = EARTH_RADIUS * 1.002;

  // Parallels every 15°
  for (let lat = -75; lat <= 75; lat += 15) {
    const r = R * Math.cos(lat * DEG);
    const y = R * Math.sin(lat * DEG);
    const pts = [];
    for (let i = 0; i <= 128; i++) {
      const t = (i / 128) * Math.PI * 2;
      pts.push(new THREE.Vector3(r * Math.cos(t), y, r * Math.sin(t)));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, lat === 0 ? matEq : mat);
    line.userData.isEquator = (lat === 0);
    group.add(line);
  }
  // Meridians every 15° (24 meridians = 24 time zones)
  for (let lon = 0; lon < 360; lon += 15) {
    const pts = [];
    for (let i = 0; i <= 64; i++) {
      const phi = (i / 64) * Math.PI - Math.PI / 2;
      pts.push(new THREE.Vector3(
        R * Math.cos(phi) * Math.cos(lon * DEG),
        R * Math.sin(phi),
        R * Math.cos(phi) * Math.sin(lon * DEG)
      ));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    group.add(new THREE.Line(geo, mat));
  }
  return group;
}
const graticule = makeGraticule();
earthGroup.add(graticule);

// ====================== TROPICS & POLAR CIRCLES ======================
function makeLatCircle(lat, color, opacity=0.7) {
  const R = EARTH_RADIUS * 1.004;
  const r = R * Math.cos(lat * DEG);
  const y = R * Math.sin(lat * DEG);
  const pts = [];
  for (let i = 0; i <= 128; i++) {
    const t = (i / 128) * Math.PI * 2;
    pts.push(new THREE.Vector3(r * Math.cos(t), y, r * Math.sin(t)));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color, transparent: true, opacity }));
}
const tropicsGroup = new THREE.Group();

// ====================== TERMINATOR (day/night boundary) ======================
// A great circle perpendicular to sun direction. Sun is fixed at +X in world space.
// So terminator circle lies in Y-Z plane.
function makeTerminator() {
  const pts = [];
  for (let i = 0; i <= 256; i++) {
    const t = (i / 256) * Math.PI * 2;
    pts.push(new THREE.Vector3(0, Math.sin(t), Math.cos(t)).multiplyScalar(EARTH_RADIUS * 1.008));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x6db3d9, transparent: true, opacity: 0.7 }));
}

  sunRaysGroup.clear();
  // Arrows pointing from +X toward earth, distributed
  for (let i = -1; i <= 1; i++) {
    for (let j = -1; j <= 1; j++) {
      const start = new THREE.Vector3(3.2, j * 0.9, i * 0.9);
      const end = new THREE.Vector3(1.3, j * 0.9, i * 0.9);

      arrow.line.material.transparent = true;

}

// ====================== TIME ZONE SHADING ======================
// 24 slightly tinted wedges alternating, visible only when "time zones" toggled
const timezoneGroup = new THREE.Group();
function makeTimezoneBands() {
  timezoneGroup.clear();
  const R = EARTH_RADIUS * 1.001;
  for (let h = 0; h < 24; h++) {
    const lonC = h * 15; // central meridian
    // band from lonC-7.5 to lonC+7.5
    const geo = new THREE.BufferGeometry();
    const verts = [];
    const idx = [];
    const SEG_LAT = 18;
    const SEG_LON = 4;
    for (let i = 0; i <= SEG_LAT; i++) {
      const lat = -90 + (180 * i / SEG_LAT);
      for (let j = 0; j <= SEG_LON; j++) {
        const lon = lonC - 7.5 + (15 * j / SEG_LON);
        const phi = lat * DEG, th = lon * DEG;
        verts.push(R * Math.cos(phi) * Math.cos(th), R * Math.sin(phi), R * Math.cos(phi) * Math.sin(th));
      }
    }
    for (let i = 0; i < SEG_LAT; i++) {
      for (let j = 0; j < SEG_LON; j++) {
        const a = i * (SEG_LON + 1) + j;
        const b = a + 1, c = a + SEG_LON + 1, d = c + 1;
        idx.push(a, b, d, a, d, c);
      }
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    const color = (h % 2 === 0) ? 0x6db3d9 : 0xf4a853;
    const mat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.07, depthWrite: false, side: THREE.DoubleSide
    });
    timezoneGroup.add(new THREE.Mesh(geo, mat));
  }
}

// ====================== ROTATION DIRECTION ARROWS ======================
const rotArrowGroup = new THREE.Group();
function makeRotArrows() {
  rotArrowGroup.clear();
  // curved arrows near the equator showing W -> E
  const positions = [
    { lat: 0, lonStart: 80 },   // one near east side
    { lat: 20, lonStart: 200 },
    { lat: -20, lonStart: 340 },
  ];
  positions.forEach(p => {
    const pts = [];
    const R = EARTH_RADIUS * 1.08;
    for (let i = 0; i <= 20; i++) {
      const lon = (p.lonStart + i * 1.5) * DEG;
      const lat = p.lat * DEG;
      pts.push(new THREE.Vector3(
        R * Math.cos(lat) * Math.cos(lon),
        R * Math.sin(lat),
        R * Math.cos(lat) * Math.sin(lon)
      ));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x7dc48a, transparent: true, opacity: 0.85 }));
    rotArrowGroup.add(line);
    // Arrow head
    const tip = pts[pts.length-1].clone();
    const prev = pts[pts.length-3].clone();
    const dir = new THREE.Vector3().subVectors(tip, prev).normalize();
    const ah = new THREE.ArrowHelper(dir, prev, 0.12, 0x7dc48a, 0.06, 0.04);
    rotArrowGroup.add(ah);
  });
}

    const R = EARTH_RADIUS * 1.005;
    const phi = c.lat * DEG, th = c.lon * DEG;

      new THREE.RingGeometry(0.025, 0.032, 32),
      new THREE.MeshBasicMaterial({ color: c.color, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
    );
    ring.position.copy(pos);
    ring.lookAt(pos.clone().multiplyScalar(2));
    // Label
    const labelEl = document.createElement('div');
    labelEl.textContent = c.name;
    labelEl.style.cssText = `color:${c.color};font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.05em;text-shadow:0 0 6px rgba(0,0,0,0.9);transform:translate(8px,-8px);pointer-events:none;`;
    const label = new CSS2DObject(labelEl);

    const obj = new THREE.Group();
    obj.add(dot); obj.add(ring); obj.add(label);
    obj.visible = c.on;
    cityGroup.add(obj);
    cityObjects[c.id] = { group: obj, data: c, worldPos: pos.clone() };
  });
}

  doy: 80,          // day of year
  solarLon: 0,      // solar subpoint longitude (degrees, -180..180), computed each frame
  solarLat: 0,      // solar subpoint latitude (degrees) — from declination
};

// ====================== CONTROLS ======================
// Knowledge point
const kpSelect = document.getElementById('kp-select');
const kpBody = document.getElementById('kp-body');
const kpOverlay = document.getElementById('kp-overlay');
function updateKP() {
  kpBody.innerHTML = KP_DOCS[kpSelect.value];
}
kpSelect.addEventListener('change', updateKP);
updateKP();

document.getElementById('kp-close').addEventListener('click', () => {
  kpOverlay.style.display = kpOverlay.style.display === 'none' ? 'block' : 'none';
});

// Speed
const speedInput = document.getElementById('speed');
const speedValue = document.getElementById('speed-value');
speedInput.addEventListener('input', () => {
  state.speed = +speedInput.value;
  speedValue.textContent = `${state.speed}×`;
});

// Pause
const pauseBtn = document.getElementById('btn-pause');
pauseBtn.addEventListener('click', () => {
  state.paused = !state.paused;
  pauseBtn.textContent = state.paused ? '继续' : '暂停';
});

// Reset view
document.getElementById('btn-reset-view').addEventListener('click', () => {
  camera.position.set(3.2, 1.4, 3.4);
  controls.target.set(0, 0, 0);
  controls.update();
});

// View buttons
document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.view;
    if (v === 'north') camera.position.set(0, 4.2, 0.001);
    else if (v === 'south') camera.position.set(0, -4.2, 0.001);
    else camera.position.set(3.8, 0.8, 3.5);
    controls.target.set(0, 0, 0);
    controls.update();
  });
});

// Layer toggles
document.getElementById('layer-sun').addEventListener('change', e => { sunRaysGroup.visible = e.target.checked; });
document.getElementById('layer-terminator').addEventListener('change', e => { terminatorHolder.visible = e.target.checked; });
document.getElementById('layer-graticule').addEventListener('change', e => { graticule.visible = e.target.checked; });
document.getElementById('layer-timezones').addEventListener('change', e => { timezoneGroup.visible = e.target.checked; });
document.getElementById('layer-hourlabels').addEventListener('change', e => { hourLabelsGroup.visible = e.target.checked; });
document.getElementById('layer-arrows').addEventListener('change', e => { rotArrowGroup.visible = e.target.checked; });
document.getElementById('layer-tropics').addEventListener('change', e => { tropicsGroup.visible = e.target.checked; });
document.getElementById('layer-poles').addEventListener('change', e => { polesGroup.visible = e.target.checked; });
document.getElementById('layer-clouds').addEventListener('change', e => { cloudMesh.visible = e.target.checked; });
document.getElementById('layer-bloom').addEventListener('change', e => {
  bloomPass.strength = e.target.checked ? 0.35 : 0.0;
});

// City toggles
const cityTogglesEl = document.getElementById('city-toggles');
CITIES.forEach(c => {
  const l = document.createElement('label');
  l.className = 'check';
  l.innerHTML = `<input type="checkbox" data-city="${c.id}" ${c.on ? 'checked' : ''}>${c.name}`;
  l.querySelector('input').addEventListener('change', e => {
    const id = e.target.dataset.city;
    cityObjects[id].group.visible = e.target.checked;
    c.on = e.target.checked;
    renderCityCards();
  });
  cityTogglesEl.appendChild(l);
});

// Day of year
const doyInput = document.getElementById('doy');
const dateLabel = document.getElementById('date-label');
const declValue = document.getElementById('decl-value');
doyInput.addEventListener('input', () => {
  state.doy = +doyInput.value;
  updateSeasonal();
});

// ====================== SEASONAL MATH ======================
// Solar declination approximation (degrees): δ = 23.44 * sin(2π * (doy + 284) / 365.25)
function computeDeclination(doy) {
  return 23.44 * Math.sin(2 * Math.PI * (doy + 284) / 365.25);
}
function dateFromDOY(doy) {
  const d = new Date(2025, 0, 1);
  d.setDate(d.getDate() + Math.round(doy));
  const m = d.getMonth() + 1, day = d.getDate();
  // label with solar event if close
  const special = [
    { doy: 80, name: '春分' }, { doy: 172, name: '夏至' },
    { doy: 266, name: '秋分' }, { doy: 355, name: '冬至' }
  ];
  let prefix = '';
  for (const s of special) {
    if (Math.abs(doy - s.doy) < 4) prefix = s.name + ' · ';
  }
  return `${prefix}${m}/${day}`;
}

function updateSeasonal() {
  const decl = computeDeclination(state.doy);
  state.solarLat = decl;
  dateLabel.textContent = dateFromDOY(state.doy);
  declValue.textContent = `${decl >= 0 ? '+' : ''}${decl.toFixed(1)}°`;
  document.getElementById('sun-lat').textContent = `${decl >= 0 ? '+' : ''}${decl.toFixed(1)}°`;

  // Tilt the terminator so it's perpendicular to the sun's new elevation
  // Sun dir in world: (cos(decl), sin(decl), 0)
  // Terminator normal = sun dir; terminator plane perpendicular.
  // Our base terminator is a circle in Y-Z plane (normal +X).
  // Rotate around Z axis by -decl so its normal goes from (1,0,0) to (cos(decl), sin(decl), 0).
  terminatorHolder.rotation.z = decl * DEG;
  // Sun position
  const sunDist = 4.5;
  sun.position.set(sunDist * Math.cos(decl * DEG), sunDist * Math.sin(decl * DEG), 0);
  sunLight.position.copy(sun.position);

  // Update sun rays tilt to match
  sunRaysGroup.rotation.z = decl * DEG;
}
updateSeasonal();

// ====================== RIGHT PANEL RENDERING ======================
const cityCardsEl = document.getElementById('city-cards');
function renderCityCards() {
  cityCardsEl.innerHTML = '';
  CITIES.filter(c => c.on).forEach(c => {
    const card = document.createElement('div');
    card.className = 'city-block';
    card.dataset.cityId = c.id;
    card.innerHTML = `
      <div class="city-name">
        <span><span class="dot" style="background:${c.color}"></span>${c.name}</span>
        <span class="city-coord">${formatCoord(c.lat, c.lon)}</span>
      </div>
      <div class="city-time" id="ctime-${c.id}">—</div>
      <div class="city-meta">
        <span>昼 <span id="cday-${c.id}">—</span>h</span>
        <span>UTC<span id="cutc-${c.id}">—</span></span>
      </div>
    `;
    cityCardsEl.appendChild(card);
  });
}
function formatCoord(lat, lon) {
  const latStr = `${Math.abs(lat).toFixed(1)}°${lat >= 0 ? 'N' : 'S'}`;
  const lonStr = `${Math.abs(lon).toFixed(1)}°${lon >= 0 ? 'E' : 'W'}`;
  return `${latStr} · ${lonStr}`;
}
renderCityCards();

// ====================== SIM LOOP ======================
const utcTimeEl = document.getElementById('utc-time');
const sunLonEl = document.getElementById('sun-lon');

function formatHMS(totalSec) {
  totalSec = ((totalSec % 86400) + 86400) % 86400;
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = Math.floor(totalSec % 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function formatHM(totalSec) {
  totalSec = ((totalSec % 86400) + 86400) % 86400;
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// Compute day length (approximate) for a given latitude (deg) and solar declination (deg)
function dayLengthHours(lat, decl) {
  const phi = lat * DEG;
  const d = decl * DEG;
  const cosH = -Math.tan(phi) * Math.tan(d);
  if (cosH <= -1) return 24; // polar day
  if (cosH >= 1) return 0;   // polar night
  const H = Math.acos(cosH);
  return (2 * H * RAD) / 15;
}

// Compute local time for a city given UTC seconds and city longitude
function localTimeFromUTC(utcSeconds, lon) {
  const localSec = utcSeconds + (lon / 15) * 3600;
  return localSec;
}

// Set initial UTC time to something sensible
state.simTime = 14 * 3600 + 54 * 60; // 14:54 UTC, matches screenshot

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (!state.paused) {
    state.simTime += dt * state.speed * 60; // speed in "simulated minutes per real second"
  }
  // Earth rotation angle: at UTC noon, prime meridian faces sun (+X).
  // Solar subpoint longitude = 180° - (UTC_seconds / 86400) * 360°, maps UTC=12h -> 0°, UTC=0h -> 180°
  // But we want earth's prime meridian rotation around Y:
  // PrimeMeridian_world_lon = (UTC_seconds / 86400) * 360° - 180° (so at UTC=12, it's at 0)
  // We set earthGroup.rotation.y = that value (converted to radians, with correct sign)
  // Three's Y axis rotation: positive = counter-clockwise when viewed from +Y (which is our "from N pole")
  // Earth rotates W->E, which from N pole is counter-clockwise. So rotation.y should increase with time.
  const rotDeg = (state.simTime / 86400) * 360 - 180;
  earthGroup.rotation.y = rotDeg * DEG;

  // Sun stays fixed on +X in world, subsolar longitude in earth coords:
  // If earth rotation is rotDeg, then the +X direction in earth local coords is at longitude -rotDeg.
  // So subsolar longitude (where sun is overhead) = -rotDeg (normalized to -180..180).
  let subLon = -rotDeg;
  while (subLon > 180) subLon -= 360;
  while (subLon < -180) subLon += 360;
  state.solarLon = subLon;

  // Update shader uniform: sun direction in WORLD coords is (cos(decl), sin(decl), 0)
  const declRad = state.solarLat * DEG;
  earthMat.uniforms.uSunDir.value.set(Math.cos(declRad), Math.sin(declRad), 0);

  // Update data panel
  utcTimeEl.textContent = formatHMS(state.simTime);
  sunLonEl.textContent = `${subLon >= 0 ? '+' : ''}${subLon.toFixed(1)}°`;

  // City cards
  CITIES.filter(c => c.on).forEach(c => {
    const localSec = localTimeFromUTC(state.simTime, c.lon);
    const timeEl = document.getElementById(`ctime-${c.id}`);
    const dayEl = document.getElementById(`cday-${c.id}`);
    const utcEl = document.getElementById(`cutc-${c.id}`);
    if (timeEl) timeEl.textContent = formatHM(localSec);
    if (dayEl) dayEl.textContent = dayLengthHours(c.lat, state.solarLat).toFixed(1);
    if (utcEl) utcEl.textContent = ` ${c.lon >= 0 ? '+' : ''}${Math.round(c.lon / 15)}`;
  });

  // Update hour labels: each label sits at a fixed longitude on earth, but we want
  // the TEXT to read the current local time at that longitude.
  // Since they're at longitude (h*15), local time = UTC + h hours.
  hourLabels.forEach(({ label, hour }) => {
    const localSec = localTimeFromUTC(state.simTime, hour * 15);
    const h = Math.floor(((localSec % 86400) + 86400) % 86400 / 3600);
    label.element.textContent = `${h}时`;
    // color: highlight solar noon (closest to subsolar)
    const diffToSun = Math.abs(((hour * 15 - subLon + 540) % 360) - 180);
    if (diffToSun < 10) label.element.style.color = '#e85d4a';
    else if (diffToSun > 170) label.element.style.color = '#6db3d9';
    else label.element.style.color = '#f4a853';
  });

  // Clouds drift at their own slower rate independent of earth rotation
  cloudMesh.rotation.y += dt * 0.00008;

  controls.update();
  composer.render();                        // replaces renderer.render — bloom compositor
  labelRenderer.render(scene, camera);      // CSS2DRenderer overlay unaffected by bloom
}
animate();

// Resize
window.addEventListener('resize', () => {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.resolution.set(w, h);
  labelRenderer.setSize(w, h);
});

</script>
</body>
